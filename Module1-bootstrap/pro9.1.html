<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Buttons</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <button class="btn btn-primary">Primary</button>

</body>
</html>
